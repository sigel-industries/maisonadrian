floating_label: Mgr. Adrián Bak
kicker: About me
title:
  line_1: Adrián Bak
  emphasis: Marketing Executive
body: "Before I started building my own brand, I worked through almost every
  position on a marketing team — from social media specialist, to influencer
  coordinator and assistant marketing director, to marketing manager and
  director. I'm originally from eastern Slovakia; I came to Prague with a clear
  goal — to build my own client base and do marketing the way I truly believe
  in: without compromise, with a focus on turning brands into genuine
  lovebrands."
note: I don't claim to know everything — but I have a fire in me for the work I love.
principles:
  - number: "01"
    title: Selectivity
    text: Not every project belongs together. Fit matters in values, aesthetics and
      ambition.
  - number: "02"
    title: Consistency
    text: Every touchpoint should feel like part of the same brand world, not a
      random output.
  - number: "03"
    title: Commercial sense
    text: Elegant presentation is useful only when it supports trust, positioning
      and demand.
image_alt: Portrait of the agency founder
