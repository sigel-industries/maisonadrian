floating_label: "Mgr. Adrián Bak "
kicker: "Marketingový manažér "
title:
  line_1: Adrián Bak
  emphasis: Marketér
body: "Predtým, než som začal budovať vlastné značky, som prešiel takmer každou
  pozíciou v marketingovom tíme — od social media špecialistu, cez koordinátora
  influencerov a asistenta marketingového riaditeľa, až po marketingového
  manažéra a riaditeľa. Pochádzam z východného Slovenska; do Prahy som prišiel s
  jasným cieľom — vybudovať si vlastnú klientelu a robiť marketing tak, ako tomu
  sám verím: bez kompromisov, s dôrazom na to, aby zo značiek vznikli skutočné
  lovebrandy."
note: Netvrdím, že viem všetko - avšak horí vo mne oheň pre moju prácu, ktorú
  milujem.
principles:
  - number: "01"
    title: Selektívnosť
    text: Nie každý projekt patrí k sebe. Zhodovať sa musia hodnoty, estetika aj
      ambícia.
  - number: "02"
    title: Konzistentnosť
    text: Každý dotyk so značkou má pôsobiť ako súčasť jedného sveta, nie náhodný
      výstup.
  - number: "03"
    title: Obchodný zmysel
    text: Elegantná prezentácia má zmysel len vtedy, keď podporuje dôveru,
      positioning a dopyt.
image_alt: Portrait of the agency founder
