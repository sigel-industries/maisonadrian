floating_label: "Mgr. Adrián Bak "
kicker: "Marketingový manažér "
title:
  line_1: Adrián Bak
  emphasis: Marketér
body: "Som marketér, influencer, aktivista, politicky aktívny a milovník vína.
  Vystriedal som pozície social media špecialistu, koordinátora influencerov,
  asistenta riaditeľa marketingu, marketingového manažéra, marketingového
  riaditeľa - aby som mohol vytvoriť niečo vlastné. Som Adrián, pochádzam z
  východného Slovenska a rozhodol som sa v Prahe vytvoriť vlastnú klientelu
  biznis partnerov a tak budovať lovebrandy. "
note: Netvrdím, že viem všetko - avšak horí vo mne oheň pre moju prácu, ktorú
  milujem.
principles:
  - number: "01"
    title: Selektívnosť
    text: Nie každý projekt patrí k sebe. Zhodovať sa musia hodnoty, estetika aj
      ambícia.
  - number: "02"
    title: Konzistentnosť
    text: Každý dotyk so značkou má pôsobiť ako súčasť jedného sveta, nie náhodný
      výstup.
  - number: "03"
    title: Obchodný zmysel
    text: Elegantná prezentácia má zmysel len vtedy, keď podporuje dôveru,
      positioning a dopyt.
image_alt: Portrait of the agency founder
