subtitle: "Väčšina značiek komunikuje nekonzistentne — iný tón na webe, iný na
  sociálnych sieťach, iný v PR. Zjednocujeme to do jedného celku: jasná
  stratégia, konzistentný vizuál a komunikácia, ktorá zostáva rovnaká naprieč
  všetkými kanálmi. Výsledkom je značka, ktorá pôsobí dôveryhodne pri každom
  kontakte so zákazníkom."
