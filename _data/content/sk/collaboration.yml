intro: Každý krok má svoj dôvod, konkrétny výstup a rozhodnutie. Bez nekonečných
  callov a prezentácií, ktoré nič neposunú.
steps:
  - number: "01"
    title: Analýza
    text: Pozrieme sa na aktuálnu značku, publikum, komunikáciu a miesta, kde sa
      stráca hodnota.
  - number: "02"
    title: Smer
    text: Jasný koncept určí positioning, tón, kanály a priority.
  - number: "03"
    title: Exekúcia
    text: Obsah, PR, spolupráce, web a spúšťacie výstupy sa dodajú v jednom systéme.
  - number: "04"
    title: Ladenie
    text: Posilníme, čo funguje, odstránime slabé miesta a udržíme značku
      konzistentnú.
