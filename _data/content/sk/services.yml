      includes_title: Čo zahŕňa
      includes:
        - Obsahový plán — o čom a ako často písať, aby to zákazníka nezaťažovalo
        - Dizajn šablóny — vizuál, ktorý sedí s webom aj sociálnymi sieťami
        - Nastavenie automatizácie — uvítací e-mail, pripomienky, segmentácia
      best_for_title: Vhodné pre
      best_for:
        - Značky, ktoré chcú komunikáciu nezávislú od algoritmov sociálnych sietí
        - E-shopy a hospitality biznisy s opakovaným nákupom/rezerváciou
      outputs_title: Typické výstupy
      outputs:
        - Šablóna newslettera + obsahový kalendár na prvé 3 mesiace
        - Nastavená automatizácia v e-mailovom nástroji podľa dohody
        - Launch kampane
