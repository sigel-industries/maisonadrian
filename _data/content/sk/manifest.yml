kicker: Brandový kód
title:
  line_1: Samotný vkus nestačí.
  line_2_prefix: Značka potrebuje
  emphasis: konzistentnosť.
lead: |
  Samotný vkus nestačí. Značka potrebuje konzistentnosť.
quote: Prémiová značka musí pôsobiť sebavedomo v každom detaile.
body: Od prvého dojmu po každodennú komunikáciu, nejde len o to vyzerať lepšie,
  ide o to pôsobiť premyslene a hodnotnejšie.
