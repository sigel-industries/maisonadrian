kicker: Exkluzívna spolupráca - Rodina Habsburgovcov
title:
  line_1: Dôverujú mi
  emphasis: výnimočné osobností.
lead: Už niekoľko rokov spoločne tvoríme výstupy pre média na Slovensku a v
  Česku. Spolupracujeme s úzkym okruhom osobností a súkromných klientov, ktorí
  oceňujú diskrétnosť, precíznosť a výnimočnú úroveň prezentácie.
quote_line_1: Arcivojvodkyňa Herta Margaréta a Arcivojvoda Šándor
  Habsburg-Lothringen, Princ a Princezná Toskánska
quote_line_2: Zakladateľka nadácie Flame of Peace
image_alt: Hostia na súkromnom stretnutí
