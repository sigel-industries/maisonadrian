kicker: Spolupráce
title:
  line_1: Jasný proces.
  emphasis: Žádná agenturní mlha.
intro: Každý krok má svůj důvod, konkrétní výstup a rozhodnutí. Bez nekonečných callů a prezentací, které nic neposunou.
steps:
- number: '01'
  title: Diagnóza
  text: Podíváme se na aktuální značku, publikum, komunikaci a místa, kde se ztrácí hodnota.
- number: '02'
  title: Směr
  text: Jasný koncept určí positioning, tón, kanály a priority.
- number: '03'
  title: Exekuce
  text: Obsah, PR, spolupráce, web i spouštěcí výstupy dodáme v jednom systému.
- number: '04'
  title: Ladění
  text: Posílíme, co funguje, odstraníme slabá místa a udržíme značku konzistentní.
