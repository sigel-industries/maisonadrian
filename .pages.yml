media:
- name: site_images
  label: Obrázky webu
  input: assets
  output: /assets
  extensions:
  - png
  - jpg
  - jpeg
  - webp
  rename: safe
  commit:
    templates:
      create: 'cms(media): pridať {filename}'
      update: 'cms(media): upraviť {filename}'
      delete: 'cms(media): odstrániť {filename}'
      rename: 'cms(media): premenovať {oldFilename} na {newFilename}'
content:
- name: language_content
  label: Texty podľa jazyka
  type: group
  items:
  - name: language_sk
    label: Slovenčina
    type: group
    items:
    - name: sk_intro
      label: 00 · Úvodná animácia
      type: file
      path: _data/content/sk/intro.yml
      format: yaml
      operations:
        create: false
        rename: false
        delete: false
      fields:
      - name: caption
        label: Text pri úvodnom logu
        type: string
        description: Krátky text pod logom počas úvodnej animácie. Zobrazuje sa aj v mobilnom menu.
        required: true
    - name: sk_hero
      label: 01 · Hero a prvá obrazovka
      type: file
      path: _data/content/sk/hero.yml
      format: yaml
      operations:
        create: false
        rename: false
        delete: false
      fields:
      - name: eyebrow
        label: Malý nadpis nad hlavným sloganom
        type: string
        description: Krátky riadok úplne hore v hero sekcii.
        required: true
      - name: title
        label: Hlavný nadpis
        type: object
        fields:
        - name: line_1
          label: Riadok 1
          type: string
          required: true
        - name: line_2
          label: Riadok 2
          type: string
          required: true
        - name: line_3_prefix
          label: Riadok 3, bežný text
          type: string
          description: Text pred kurzívnym slovom.
          required: true
        - name: emphasis
          label: Riadok 3, zvýraznené slovo
          type: string
          description: Kurzívna zlatá časť nadpisu.
          required: true
        - name: line_4
          label: Riadok 4
          type: string
          required: true
        description: Nadpis je rozdelený na pevné riadky, aby sa nerozbil prémiový layout.
      - name: subtitle
        label: Úvodný opis
        type: text
        description: Odsek pod hlavným nadpisom.
        required: true
        options:
          maxlength: 420
      - name: primary_cta
        label: Hlavné tlačidlo
        type: string
        description: Text zlatého tlačidla otvárajúceho kontakt.
        required: true
      - name: secondary_cta
        label: Druhý odkaz
        type: string
        description: Text odkazu smerujúceho na služby.
        required: true
      - name: values
        label: Štyri hodnoty pod hero sekciou
        type: string
        description: Každá položka patrí k jednej ikone. Poradie ani počet nemeníš.
        required: true
        list:
          min: 4
          max: 4
    - name: sk_manifest
      label: 02 · Brand code
      type: file
      path: _data/content/sk/manifest.yml
      format: yaml
      operations:
        create: false
        rename: false
        delete: false
      fields:
