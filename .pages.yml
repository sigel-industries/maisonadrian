          label: Interný identifikátor
          type: string
          required: true
          hidden: true
          readonly: true
        - name: number
          label: Číslo služby
          type: string
          required: true
          readonly: true
        - name: word
          label: Veľké dekoratívne slovo
          type: string
          description: Krátke slovo v obrazovej časti, napr. BRAND alebo WEB.
          required: true
        - name: vertical
          label: Zvislý popis
          type: string
          required: true
        - name: chip
          label: Malý štítok v obraze
          type: string
          required: true
        - name: panel_kicker
          label: Malý text v obrazovom paneli
          type: string
          required: true
        - name: panel_title
          label: Hlavný text v obrazovom paneli
          type: string
          required: true
        - name: panel_meta
          label: Kľúčové slová v obrazovom paneli
          type: string
          required: true
