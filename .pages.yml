        label: Malý nadpis sekcie
        type: string
        required: true
      - name: title
        label: Veľký nadpis
        type: object
        fields:
        - name: line_1
          label: Prvý riadok
          type: string
          required: true
        - name: line_2_prefix
          label: Druhý riadok, bežný text
          type: string
          required: true
        - name: emphasis
          label: Druhý riadok, zvýraznené slovo
          type: string
          required: true
        description: Zvýraznená časť sa zobrazí kurzívou.
      - name: lead
        label: Hlavný odsek
        type: text
        required: true
        options:
          maxlength: 500
      - name: quote
        label: Veľká citácia
        type: text
        description: Krátky výrazný text v pravej časti.
        required: true
        options:
          maxlength: 240
      - name: body
        label: Doplňujúci odsek
        type: text
        required: true
        options:
          maxlength: 500
    - name: sk_services
