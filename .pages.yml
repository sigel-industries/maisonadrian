- name: visual_content
  label: Fotografie, logá a odkazy
  type: group
  items:
  - name: site_content
    label: Globálne obrázky a logá
    type: file
    path: _data/site.yml
    format: yaml
    operations:
      create: false
      rename: false
      delete: false
    fields:
    - name: images
      label: Hlavné fotografie a logo
      type: object
      fields:
      - name: brand_logo
        label: Logo agentúry
        type: image
        description: Používa sa v intre, hero karte, formulári a na presmerovacej stránke.
        required: true
        options:
          media: site_images
          path: uploads
          extensions:
          - png
          - jpg
          - jpeg
          - webp
          rename: safe
      - name: hero
        label: Hlavná hero fotografia
        type: image
        description: Veľký obrázok na úvodnej obrazovke. Ideálne WebP alebo JPG na šírku.
        required: true
        options:
          media: site_images
          path: uploads
          extensions:
          - png
          - jpg
          - jpeg
          - webp
          rename: safe
      - name: about
        label: Fotografia v sekcii O agentúre
        type: image
        required: true
        options:
          media: site_images
          path: uploads
          extensions:
          - png
          - jpg
          - jpeg
          - webp
          rename: safe
      - name: vip
        label: Fotografia v sekcii VIP klienti
        type: image
        required: true
        options:
          media: site_images
          path: uploads
          extensions:
          - png
          - jpg
          - jpeg
          - webp
          rename: safe
      description: Výmena obrázka automaticky platí vo všetkých troch jazykových verziách.
    - name: service_backgrounds
      label: Pozadia šiestich služieb
      description: Každá položka patrí presne jednej službe. Kľúč nemeníš.
      required: true
      type: object
      list:
        min: 6
        max: 6
        collapsible:
          collapsed: true
          summary: '{key}'
      fields:
      - name: key
        label: Interný názov služby
        type: string
        required: true
        hidden: true
        readonly: true
      - name: image
        label: Obrázok pozadia
        type: image
        required: true
        options:
          media: site_images
          path: service-backgrounds
          extensions:
          - png
          - jpg
          - jpeg
          - webp
          rename: safe
    - name: exclusive_links
      label: Odkazy exkluzívnych projektov
      type: object
      fields:
      - name: sigel
        label: SIGEL Industries
        type: string
        required: true
        pattern:
          regex: ^https?://.+$
          message: Použi celú adresu začínajúcu http:// alebo https://.
      - name: tank
        label: Party Tank Prague
        type: string
        required: true
        pattern:
          regex: ^https?://.+$
          message: Použi celú adresu začínajúcu http:// alebo https://.
    - name: client_logos
      label: Logá klientov
      type: object
      fields:
      - name: row_1
        label: Prvý rad logotypov
        description: 14 log. Poradie zodpovedá poradiu na webe.
        required: true
        type: object
        fields:
        - name: name
          label: Názov klienta
          type: string
          description: Zobrazí sa aj ako prístupný popis loga.
          required: true
        - name: image
          label: Logo
          type: image
          required: true
          options:
            media: site_images
            path: client-logos
            extensions:
            - png
            - jpg
            - jpeg
            - webp
            rename: safe
        - name: url
          label: Odkaz na web alebo profil
          type: string
          description: Môže zostať prázdny, ak logo nemá byť klikateľné.
          required: false
          pattern:
            regex: ^(|https?://.+)$
            message: Použi celú adresu začínajúcu http:// alebo https://, prípadne nechaj pole prázdne.
        list:
          min: 14
          max: 14
          collapsible:
            collapsed: true
            summary: '{name}'
      - name: row_2
        label: Druhý rad logotypov
        description: 13 log. Poradie zodpovedá poradiu na webe.
        required: true
        type: object
        fields:
        - name: name
          label: Názov klienta
          type: string
          description: Zobrazí sa aj ako prístupný popis loga.
          required: true
        - name: image
          label: Logo
          type: image
          required: true
          options:
            media: site_images
            path: client-logos
            extensions:
            - png
            - jpg
            - jpeg
            - webp
            rename: safe
        - name: url
          label: Odkaz na web alebo profil
          type: string
          description: Môže zostať prázdny, ak logo nemá byť klikateľné.
          required: false
          pattern:
            regex: ^(|https?://.+)$
            message: Použi celú adresu začínajúcu http:// alebo https://, prípadne nechaj pole prázdne.
        list:
          min: 13
          max: 13
          collapsible:
            collapsed: true
            summary: '{name}'
      description: Logo môžeš vymeniť, premenovať a upraviť jeho odkaz. Počet položiek je zamknutý, aby sa nerozbila animácia.
settings:
  hide: true
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: 'cms: vytvoriť {path}'
      update: 'cms: upraviť {path}'
      delete: 'cms: odstrániť {path}'
      rename: 'cms: premenovať {oldPath} na {newPath}'
      
