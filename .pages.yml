      - name: intro
        label: Úvodný opis
        type: text
        required: true
        options:
          maxlength: 500
      - name: topbar
        label: Text v hornej lište služieb
        type: string
        required: true
      - name: detail_cta
        label: Text tlačidla pri každej službe
        type: string
        required: true
      - name: hint
        label: Pomocný text pod službami
        type: string
        required: true
      - name: items
        label: Šesť služieb
        description: Každú službu otvoríš kliknutím na jej názov. Počet služieb je zámerne zamknutý na šesť.
        required: true
        type: object
        list:
          min: 6
          max: 6
          collapsible:
            collapsed: true
            summary: '{number} · {title}'
        fields:
