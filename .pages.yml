              max: 2
          - name: outputs_title
            label: Nadpis stĺpca 3
            type: string
            required: true
          - name: outputs
            label: Položky stĺpca 3
            type: string
            required: true
            list:
              min: 3
              max: 3
          - name: cta
            label: Tlačidlo v detaile
            type: string
            required: true
          description: Obsah modálneho okna, ktoré sa otvorí po kliknutí na službu.
