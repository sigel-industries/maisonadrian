---
layout: null
---
{% assign sitecms = site.data.site %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index" />
  <meta name="theme-color" content="#050505" />
  <title>Maison Adriano Agency</title>
  <style>html,body{margin:0;min-height:100%;background:#050505}body{display:grid;place-items:center}.mark{width:min(270px,62vw);opacity:.72;filter:drop-shadow(0 0 18px rgba(255,255,255,.08))}</style>
  <noscript><meta http-equiv="refresh" content="0; url=en/" /></noscript>
</head>
<body>
  <img class="mark" src="{{ sitecms.images.brand_logo | escape }}" alt="Maison Adriano Agency" />
  <script>
    (() => {
      const valid = ['cs','sk','en'];
      let target = null;
      try { target = localStorage.getItem('ma-language'); } catch (_) {}
      if (!valid.includes(target)) {
        const languages = navigator.languages?.length ? navigator.languages : [navigator.language || 'en'];
        const detected = languages.map(language => language.toLowerCase().split('-')[0]).find(language => language === 'cs' || language === 'sk');
        target = detected || 'en';
      }
      location.replace(target + '/');
    })();
  </script>
</body>
</html>
