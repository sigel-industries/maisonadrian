<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="robots" content="noindex"><meta name="theme-color" content="#050505"><title>Maison Adriano Agency</title></head>
<body style="margin:0;background:#050505">
<script>
(() => {
  const parts = location.pathname.split('/').filter(Boolean);
  const onGitHubPages = location.hostname.endsWith('github.io');
  const base = onGitHubPages && parts.length ? `/${parts[0]}/` : '/';
  location.replace(base);
})();
</script>
</body>
</html>
